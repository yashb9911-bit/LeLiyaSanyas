<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yash ❤️ Sanya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#fff0f3,#ffe3ec);
text-align:center;
padding:30px;
margin:0;
}

.container{
max-width:600px;
margin:auto;
}

h1{
font-family:'Playfair Display', serif;
font-size:44px;
color:#ff2e63;
margin-bottom:5px;
}

.hashtag{
font-size:16px;
color:#ff2e63;
font-weight:500;
letter-spacing:1px;
margin-top:-10px;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
margin-top:20px;
}

button{
background:#ff2e63;
color:white;
border:none;
padding:14px 26px;
margin:10px;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e61c4f;
transform:scale(1.05);
}

.hidden{
display:none;
}

img{
width:100%;
border-radius:14px;
margin-top:20px;
}

.date{
font-family:'Playfair Display', serif;
font-size:48px;
margin-top:20px;
color:#ff2e63;
}

canvas{
margin-top:20px;
border-radius:12px;
}

#countdown{
font-size:20px;
margin-top:15px;
color:#444;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Yash ❤️ Sanya</h1>
<p class="hashtag">#LeLiyaSanyas</p>

<div id="start" class="card">

<p>Before we reveal something special…</p>
<p>Let’s see how well you know us.</p>

<button onclick="startGame()">Start the Game</button>

</div>

<div id="side" class="card hidden">

<h2>Whose side are you on?</h2>

<button onclick="startQuiz('yash')">Team Yash 😎</button> <button onclick="startQuiz('sanya')">Team Sanya 💃</button>

</div>

<div id="quiz" class="card hidden"></div>

<div id="reveal" class="card hidden">

<h2>🎉 You unlocked the secret 🎉</h2>

<p>Scratch to reveal the date</p>

<canvas id="scratch" width="300" height="120"></canvas>

<div id="date" class="date hidden">
24 AUGUST 2026
</div>

<div id="countdown" class="hidden"></div>

<img src="couple.jpg">

</div>

</div>

<script>

let step=0
let currentQuestions=[]

const yashQuestions=[

{q:"Which sport does Yash follow the most?",
options:["Cricket","Football","Badminton"]},

{q:"What does Yash enjoy doing most?",
options:["Writing poetry","Watching movies","Sleeping"]},

{q:"What does Yash love most?",
options:["Traveling","Shopping","Cooking"]},

{q:"Yash’s favourite weekend plan?",
options:["Watching sports","Parties","Shopping"]},

{q:"Yash's biggest passion?",
options:["Music","Fashion","Dancing"]}

]

const sanyaQuestions=[

{q:"What dessert does Sanya love?",
options:["Chocolate","Ice Cream","Cake"]},

{q:"What does Sanya enjoy most?",
options:["Travel","Shopping","Reading"]},

{q:"Sanya’s dream vacation?",
options:["Beach","Mountains","City"]},

{q:"What annoys Sanya about Yash?",
options:["Sports obsession","Bad jokes","Sleeping late"]},

{q:"Who said I love you first?",
options:["Yash","Sanya","Both"]}

]

function startGame(){
document.getElementById("start").classList.add("hidden")
document.getElementById("side").classList.remove("hidden")
}

function startQuiz(side){

document.getElementById("side").classList.add("hidden")

currentQuestions = side==="yash" ? yashQuestions : sanyaQuestions

showQuestion()

}

function showQuestion(){

if(step >= currentQuestions.length){

document.getElementById("quiz").classList.add("hidden")
document.getElementById("reveal").classList.remove("hidden")

initScratch()

return
}

let q=currentQuestions[step]

let html=`<h2>${q.q}</h2>`

q.options.forEach(option=>{
html+=`<button onclick="nextQuestion()">${option}</button>`
})

document.getElementById("quiz").innerHTML=html
document.getElementById("quiz").classList.remove("hidden")

}

function nextQuestion(){
step++
showQuestion()
}

function initScratch(){

const canvas=document.getElementById("scratch")
const ctx=canvas.getContext("2d")

ctx.fillStyle="#ff2e63"
ctx.fillRect(0,0,300,120)

ctx.fillStyle="white"
ctx.font="20px Poppins"
ctx.fillText("Scratch Here",90,65)

let scratching=false
let revealed=false

function scratch(x,y){

ctx.globalCompositeOperation="destination-out"

ctx.beginPath()
ctx.arc(x,y,18,0,Math.PI*2)
ctx.fill()

if(!revealed){

revealed=true

document.getElementById("date").classList.remove("hidden")
document.getElementById("countdown").classList.remove("hidden")

startConfetti()
startCountdown()

}

}

canvas.addEventListener("mousedown",()=>scratching=true)
canvas.addEventListener("mouseup",()=>scratching=false)

canvas.addEventListener("mousemove",(e)=>{
if(!scratching) return
scratch(e.offsetX,e.offsetY)
})

canvas.addEventListener("touchstart",(e)=>{
scratching=true
})

canvas.addEventListener("touchend",(e)=>{
scratching=false
})

canvas.addEventListener("touchmove",(e)=>{

if(!scratching) return

let rect=canvas.getBoundingClientRect()

let x=e.touches[0].clientX-rect.left
let y=e.touches[0].clientY-rect.top

scratch(x,y)

})

}

function startConfetti(){

for(let i=0;i<60;i++){

let confetti=document.createElement("div")

confetti.innerHTML="🎉"

confetti.style.position="fixed"
confetti.style.left=Math.random()*100+"vw"
confetti.style.top="-20px"
confetti.style.fontSize="30px"
confetti.style.animation="fall 3s linear"

document.body.appendChild(confetti)

setTimeout(()=>confetti.remove(),3000)

}

}

function startCountdown(){

let wedding=new Date("Aug 24, 2026 00:00:00").getTime()

setInterval(()=>{

let now=new Date().getTime()

let diff=wedding-now

let days=Math.floor(diff/(1000*60*60*24))

document.getElementById("countdown").innerHTML = days+" days to go 💍"

},1000)

}

</script>

</body>
</html>

<!DOCTYPE html>

<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Yash ❤️ Sanya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
font-family:'Poppins', sans-serif;
background:linear-gradient(135deg,#fff0f3,#ffe3ec);
text-align:center;
padding:30px;
margin:0;
overflow-x:hidden;
}

.container{
max-width:600px;
margin:auto;
}

h1{
font-family:'Playfair Display', serif;
font-size:42px;
color:#ff2e63;
margin-bottom:5px;
}

.hashtag{
font-size:16px;
color:#ff2e63;
font-weight:500;
letter-spacing:1px;
margin-top:-8px;
}

.card{
background:white;
padding:30px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
margin-top:20px;
}

button{
background:#ff2e63;
color:white;
border:none;
padding:14px 26px;
margin:10px;
border-radius:30px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#e61c4f;
transform:scale(1.05);
}

.hidden{
display:none;
}

img{
width:100%;
border-radius:14px;
margin-top:25px;
}

.date{
font-family:'Playfair Display', serif;
font-size:48px;
margin-top:20px;
color:#ff2e63;
}

#countdown{
font-size:20px;
margin-top:10px;
color:#444;
}

.reveal-title{
font-size:16px;
margin-bottom:10px;
}

.progress{
height:8px;
background:#eee;
border-radius:20px;
margin-bottom:20px;
overflow:hidden;
}

.progress-bar{
height:100%;
background:#ff2e63;
width:0%;
transition:0.4s;
}

.heart{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear forwards;
filter:drop-shadow(0 0 6px pink);
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(360deg);
}
}

</style>

</head>

<body>

<div class="container">

<h1>Yash ❤️ Sanya</h1>
<p class="hashtag">#LeLiyaSanYas</p>

<div id="start" class="card">

<p>Before we reveal something special…</p>
<p>Let’s see how well you know us.</p>

<button onclick="startGame()">Start the Game</button>

</div>

<div id="side" class="card hidden">

<h2>Whose side are you on?</h2>

<button onclick="startQuiz('yash')">Team Yash 😎</button> <button onclick="startQuiz('sanya')">Team Sanya 💃</button>

</div>

<div id="quiz" class="card hidden">

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<div id="quizContent"></div>

</div>

<div id="reveal" class="card hidden">

<h2 class="reveal-title">🎉 You unlocked the secret 🎉</h2>

<p>Ready to see our wedding date?</p>

<button onclick="revealDate()">Reveal the Date 💍</button>

<div id="date" class="date hidden"></div>

<div id="countdown" class="hidden"></div>

<img src="couple.jpg">

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<script>

let step=0
let currentQuestions=[]

const yashQuestions=[

{q:"What is one thing Yash loves the most?",
options:["Football","Sneakers","Music"],
correct:"Sneakers"},

{q:"What does Yash enjoy doing most?",
options:["Making Music","Watching movies","Sleeping"],
correct:"Making Music"},

{q:"What is Yash's artist name?",
options:["Ehsaas","Lil B","Big B"],
correct:"Ehsaas"},

{q:"Yash’s favourite weekend plan?",
options:["Watching football/cricket","Play FIFA through the weekend","Shopping"],
correct:"Play FIFA through the weekend"},

{q:"What is one thing Yash really wants to do?",
options:["Go to London","Perform live infront of a big audience","Just chill"],
correct:"Perform live infront of a big audience"}

]

const sanyaQuestions=[

{q:"Sanya's favourite pastime?",
options:["Watching movies/shows","Shopping","Going on food spree"],
correct:"Watching movies/shows"},

{q:"Does Sanya has dimples?",
options:["Yes","No"],
correct:"Yes"},

{q:"What is Sanya's dream destination?",
options:["Croatia","Finland","Paris"],
correct:"Finland"},

{q:"Sanya's favourite fast food place?",
options:["Domino's","KFC","Mc D"],
correct:"Mc D"},

{q:"Who is Sanya's favourite actor?",
options:["Shahid Kapoor","SRK","Hritik Roshan"],
correct:"SRK"}

]

function startGame(){
document.getElementById("start").classList.add("hidden")
document.getElementById("side").classList.remove("hidden")
}

function startQuiz(side){

document.getElementById("side").classList.add("hidden")

currentQuestions = side==="yash" ? yashQuestions : sanyaQuestions

step=0
showQuestion()

}

function showQuestion(){

if(step >= currentQuestions.length){

document.getElementById("quiz").classList.add("hidden")
document.getElementById("reveal").classList.remove("hidden")
return
}

let q=currentQuestions[step]

let html=`<h3>Question ${step+1} / ${currentQuestions.length}</h3>`
html+=`<h2>${q.q}</h2>`

q.options.forEach(option=>{
html+=`<button onclick="checkAnswer('${option}')">${option}</button>`
})

document.getElementById("quizContent").innerHTML=html

document.getElementById("quiz").classList.remove("hidden")

let progress=(step/currentQuestions.length)*100
document.getElementById("progressBar").style.width=progress+"%"

}

function checkAnswer(answer){

let correctAnswer=currentQuestions[step].correct

if(answer===correctAnswer){

step++
showQuestion()

}else{

alert("Wrong answer 😜 Start again!")

step=0

document.getElementById("quiz").classList.add("hidden")
document.getElementById("side").classList.remove("hidden")

}

}

function revealDate(){

document.getElementById("music").play()

typeDate()

startHearts()

startCountdown()

}

function typeDate(){

let text="24 AUGUST 2026"
let i=0

let interval=setInterval(()=>{

document.getElementById("date").classList.remove("hidden")

document.getElementById("date").innerHTML+=text[i]

i++

if(i>=text.length){
clearInterval(interval)
}

},120)

}

function startHearts(){

setInterval(()=>{

let heart=document.createElement("div")

heart.innerHTML="❤️"
heart.classList.add("heart")

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(3+Math.random()*3)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),6000)

},300)

}

function startCountdown(){

let wedding=new Date("Aug 24, 2026 00:00:00").getTime()

setInterval(()=>{

let now=new Date().getTime()

let diff=wedding-now

let days=Math.floor(diff/(1000*60*60*24))

document.getElementById("countdown").classList.remove("hidden")

document.getElementById("countdown").innerHTML=
days+" days to go 💍"

},1000)

}

</script>

</body>

</html>
